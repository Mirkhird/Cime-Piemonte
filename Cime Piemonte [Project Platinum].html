<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cime Piemonte 2000+</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; color: #1a202c; }

  header {
    background: linear-gradient(135deg, #1a365d 0%, #2d6a4f 100%);
    color: white;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 { font-size: 1.6rem; font-weight: 700; }
  header p { font-size: 0.9rem; opacity: 0.85; margin-top: 4px; }
  .badge {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.85rem;
    white-space: nowrap;
  }

  .filters {
    background: white;
    padding: 20px 32px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    align-items: flex-end;
    border-bottom: 1px solid #e2e8f0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .filter-group { display: flex; flex-direction: column; gap: 5px; }
  .filter-group label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: #718096; letter-spacing: 0.05em; }
  .filter-group select, .filter-group input {
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.9rem;
    background: #f7fafc;
    color: #2d3748;
    outline: none;
    transition: border-color 0.2s;
    min-width: 160px;
  }
  .filter-group select:focus, .filter-group input:focus { border-color: #2d6a4f; }
  .filter-group input { min-width: 220px; }

  .btn-reset {
    background: #e53e3e;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 0.9rem;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.2s;
    align-self: flex-end;
  }
  .btn-reset:hover { background: #c53030; }

  .stats-bar {
    padding: 10px 32px;
    background: #edf2f7;
    font-size: 0.85rem;
    color: #4a5568;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
  }
  .stats-bar span b { color: #2d6a4f; }

  .table-container {
    padding: 20px 32px;
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    font-size: 0.88rem;
  }
  thead tr { background: #1a365d; color: white; }
  thead th {
    padding: 14px 16px;
    text-align: left;
    font-weight: 600;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { background: #2a4a7f; }
  thead th .sort-icon { margin-left: 5px; opacity: 0.6; }
  thead th.sorted .sort-icon { opacity: 1; }

  tbody tr { border-bottom: 1px solid #f0f4f8; transition: background 0.15s; }
  tbody tr:hover { background: #f7fafc; }
  tbody tr:last-child { border-bottom: none; }
  tbody td { padding: 11px 16px; color: #2d3748; }
  tbody td:first-child { font-family: monospace; font-size: 0.8rem; color: #718096; }

  .tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.78rem;
    font-weight: 700;
  }
  .tag-4000 { background: #fff5f5; color: #c53030; border: 1px solid #fed7d7; }
  .tag-3500 { background: #fff8f0; color: #c05621; border: 1px solid #fbd38d; }
  .tag-3000 { background: #fffff0; color: #744210; border: 1px solid #faf089; }
  .tag-2500 { background: #f0fff4; color: #276749; border: 1px solid #9ae6b4; }
  .tag-2000 { background: #ebf8ff; color: #2c5282; border: 1px solid #bee3f8; }

  .prov {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 6px;
    font-size: 0.8rem;
    font-weight: 700;
    background: #e2e8f0;
    color: #4a5568;
  }

  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    padding: 20px;
    flex-wrap: wrap;
  }
  .pagination button {
    border: 1.5px solid #e2e8f0;
    background: white;
    color: #2d3748;
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 0.88rem;
    transition: all 0.2s;
  }
  .pagination button:hover { border-color: #2d6a4f; color: #2d6a4f; }
  .pagination button.active { background: #2d6a4f; color: white; border-color: #2d6a4f; }
  .pagination button:disabled { opacity: 0.4; cursor: default; }
  .pagination .page-info { color: #718096; font-size: 0.88rem; padding: 0 8px; }

  .no-results { text-align: center; padding: 60px; color: #a0aec0; font-size: 1rem; }
</style>
</head>
<body>

<header>
  <div style="font-size:2.5rem">🏔️</div>
  <div>
    <h1>Cime Piemonte 2000+</h1>
    <p>Database completo da OpenStreetMap</p>
  </div>
  <div style="margin-left:auto">
    <div class="badge" id="total-badge">1652 cime</div>
  </div>
</header>

<div class="filters">
  <div class="filter-group">
    <label>🔍 Cerca per nome</label>
    <input type="text" id="search" placeholder="Es. Monviso, Rocciamelone...">
  </div>
  <div class="filter-group">
    <label>🗺️ Provincia</label>
    <select id="filter-prov">
      <option value="">Tutte le province</option>
      <option value="TO">TO — Torino</option>
      <option value="CN">CN — Cuneo</option>
      <option value="VB">VB — Verbano-Cusio-Ossola</option>
      <option value="VC">VC — Vercelli</option>
      <option value="BI">BI — Biella</option>
    </select>
  </div>
  <div class="filter-group">
    <label>📏 Fascia altitudine</label>
    <select id="filter-tag">
      <option value="">Tutte le fasce</option>
      <option value="4000+">4000+ m</option>
      <option value="3500+">3500–3999 m</option>
      <option value="3000+">3000–3499 m</option>
      <option value="2500+">2500–2999 m</option>
      <option value="2000+">2000–2499 m</option>
    </select>
  </div>
  <div class="filter-group">
    <label>⛰️ Catena montuosa</label>
    <select id="filter-catena">
      <option value="">Tutte le catene</option>
    </select>
  </div>
  <div class="filter-group">
    <label>🏞️ Valle</label>
    <select id="filter-valle">
      <option value="">Tutte le valli</option>
    </select>
  </div>
  <button class="btn-reset" onclick="resetFilters()">✕ Reset</button>
</div>

<div class="stats-bar" id="stats-bar">
  <span>Risultati: <b id="count-results">1652</b></span>
  <span>Più alta: <b id="stat-max">—</b></span>
  <span>Più bassa: <b id="stat-min">—</b></span>
  <span>Media quota: <b id="stat-avg">—</b></span>
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('ID OSM')" id="th-osm">ID OSM <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('Nome cima')" id="th-nome">Nome cima <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('Quota cima')" id="th-quota">Quota (m) <span class="sort-icon">↕</span></th>
        <th>Tag altitudine</th>
        <th onclick="sortBy('Valle')" id="th-valle">Valle <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('Catena')" id="th-catena">Catena <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('Provincia')" id="th-prov">Prov. <span class="sort-icon">↕</span></th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
  <div id="no-results" class="no-results" style="display:none">Nessuna cima trovata con i filtri selezionati.</div>
</div>

<div class="pagination" id="pagination"></div>

 "Alpi Liguri", "Provincia": "CN"}, {"ID OSM": "2448222014", "Nome cima": "Pizzo del Camino", "Quota cima": "2006", "Tag altitudine": "2000+", "Valle": "Valle Anzasca", "Catena": "Alpi Pennine", "Provincia": "VB"}, {"ID OSM": "1478258847", "Nome cima": "Punta del Mezzogiorno", "Quota cima": "2004", "Tag altitudine": "2000+", "Valle": "Valle Grana", "Catena": "Alpi Cozie Sud", "Provincia": "CN"}, {"ID OSM": "2450499175", "Nome cima": "Monte Baussetti", "Quota cima": "2004", "Tag altitudine": "2000+", "Valle": "Valle Tanaro", "Catena": "Alpi Liguri", "Provincia": "CN"}, {"ID OSM": "5306853172", "Nome cima": "Monte Valletta", "Quota cima": "2003", "Tag altitudine": "2000+", "Valle": "Val Chisone", "Catena": "Alpi Cozie Sud", "Provincia": "TO"}, {"ID OSM": "5306332422", "Nome cima": "Roche Courbe", "Quota cima": "2002", "Tag altitudine": "2000+", "Valle": "Val Chisone", "Catena": "Alpi Cozie Sud", "Provincia": "TO"}, {"ID OSM": "6710630280", "Nome cima": "Dente di Seirasso", "Quota cima": "2000", "Tag altitudine": "2000+", "Valle": "Valle Pesio", "Catena": "Alpi Marittime", "Provincia": "CN"}];

const PAGE_SIZE = 50;
let filtered = [...ALL_PEAKS];
let currentPage = 1;
let sortCol = 'Quota cima';
let sortDir = -1; // -1 = desc, 1 = asc

// Popola select catena e valle
const catene = [...new Set(ALL_PEAKS.map(p => p['Catena']))].sort();
const valli = [...new Set(ALL_PEAKS.map(p => p['Valle']))].sort();
const selCatena = document.getElementById('filter-catena');
const selValle = document.getElementById('filter-valle');
catene.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; selCatena.appendChild(o); });
valli.forEach(v => { const o = document.createElement('option'); o.value = v; o.textContent = v; selValle.appendChild(o); });

function tagClass(tag) {
  if (tag === '4000+') return 'tag tag-4000';
  if (tag === '3500+') return 'tag tag-3500';
  if (tag === '3000+') return 'tag tag-3000';
  if (tag === '2500+') return 'tag tag-2500';
  return 'tag tag-2000';
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase().trim();
  const prov = document.getElementById('filter-prov').value;
  const tag = document.getElementById('filter-tag').value;
  const catena = document.getElementById('filter-catena').value;
  const valle = document.getElementById('filter-valle').value;

  filtered = ALL_PEAKS.filter(p => {
    if (search && !p['Nome cima'].toLowerCase().includes(search)) return false;
    if (prov && p['Provincia'] !== prov) return false;
    if (tag && p['Tag altitudine'] !== tag) return false;
    if (catena && p['Catena'] !== catena) return false;
    if (valle && p['Valle'] !== valle) return false;
    return true;
  });

  sortFiltered();
  currentPage = 1;
  render();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = col === 'Quota cima' ? -1 : 1; }
  sortFiltered();
  render();
}

function sortFiltered() {
  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'Quota cima') { va = +va; vb = +vb; }
    else { va = (va || '').toLowerCase(); vb = (vb || '').toLowerCase(); }
    if (va < vb) return -sortDir;
    if (va > vb) return sortDir;
    return 0;
  });
}

function render() {
  const tbody = document.getElementById('table-body');
  const noRes = document.getElementById('no-results');
  const total = filtered.length;
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('count-results').textContent = total;
  document.getElementById('total-badge').textContent = total + ' cime';

  if (total === 0) {
    tbody.innerHTML = '';
    noRes.style.display = '';
    document.getElementById('stats-bar').style.display = 'none';
    document.getElementById('pagination').innerHTML = '';
    return;
  }
  noRes.style.display = 'none';
  document.getElementById('stats-bar').style.display = '';

  const quotas = filtered.map(p => +p['Quota cima']);
  document.getElementById('stat-max').textContent = Math.max(...quotas) + ' m';
  document.getElementById('stat-min').textContent = Math.min(...quotas) + ' m';
  document.getElementById('stat-avg').textContent = Math.round(quotas.reduce((a,b)=>a+b,0)/quotas.length) + ' m';

  tbody.innerHTML = page.map(p => `
    <tr>
      <td>${p['ID OSM']}</td>
      <td><b>${p['Nome cima']}</b></td>
      <td><b>${p['Quota cima']}</b></td>
      <td><span class="${tagClass(p['Tag altitudine'])}">${p['Tag altitudine']}</span></td>
      <td>${p['Valle']}</td>
      <td>${p['Catena']}</td>
      <td><span class="prov">${p['Provincia']}</span></td>
    </tr>
  `).join('');

  renderPagination(total);
  updateSortIcons();
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (pages <= 1) { pag.innerHTML = ''; return; }

  let html = `<button onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Prec</button>`;
  
  let start = Math.max(1, currentPage - 3);
  let end = Math.min(pages, currentPage + 3);
  if (start > 1) html += `<button onclick="goPage(1)">1</button><span class="page-info">…</span>`;
  for (let i = start; i <= end; i++) {
    html += `<button onclick="goPage(${i})" class="${i===currentPage?'active':''}">${i}</button>`;
  }
  if (end < pages) html += `<span class="page-info">…</span><button onclick="goPage(${pages})">${pages}</button>`;
  
  html += `<button onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>Succ ›</button>`;
  html += `<span class="page-info">Pag. ${currentPage} di ${pages} — ${total} cime</span>`;
  pag.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  render();
  window.scrollTo(0, 0);
}

function updateSortIcons() {
  ['th-osm','th-nome','th-quota','th-valle','th-catena','th-prov'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.classList.remove('sorted'); el.querySelector('.sort-icon').textContent = '↕'; }
  });
  const map = {'ID OSM':'th-osm','Nome cima':'th-nome','Quota cima':'th-quota','Valle':'th-valle','Catena':'th-catena','Provincia':'th-prov'};
  const activeId = map[sortCol];
  if (activeId) {
    const el = document.getElementById(activeId);
    el.classList.add('sorted');
    el.querySelector('.sort-icon').textContent = sortDir === -1 ? '↓' : '↑';
  }
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('filter-prov').value = '';
  document.getElementById('filter-tag').value = '';
  document.getElementById('filter-catena').value = '';
  document.getElementById('filter-valle').value = '';
  applyFilters();
}

// Event listeners
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('filter-prov').addEventListener('change', applyFilters);
document.getElementById('filter-tag').addEventListener('change', applyFilters);
document.getElementById('filter-catena').addEventListener('change', applyFilters);
document.getElementById('filter-valle').addEventListener('change', applyFilters);

// Init
sortFiltered();
render();
</script>
